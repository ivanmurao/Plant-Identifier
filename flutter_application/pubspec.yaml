name: plant_identifier
description: Identify plants using the Pl@ntNet API
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client for Pl@ntNet API calls
  http: ^1.2.1

  # Image picking (camera + gallery)
  image_picker: ^1.1.2

  # App icon set
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "web/icons/plantid.jpeg"
