name: plant_scan
description: Identify plants using the Plant.id by Kindwise.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  image_picker: ^1.1.2
  cupertino_icons: ^1.0.8
  flutter_speed_dial: ^7.0.0
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  image_path: "assets/images/plantscan-logo.png"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/logo.png
  
